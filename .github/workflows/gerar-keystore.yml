name: 1) Gerar a chave de assinatura (rodar UMA vez)

# Cria a "chave de assinatura" (upload keystore) do app, na nuvem, sem você precisar instalar nada.
# ANTES de rodar: crie o secret KEYSTORE_PASSWORD (Settings > Secrets and variables > Actions) com
# uma senha forte que SÓ VOCÊ guarda. Depois rode este workflow (Actions > este workflow > Run).
# No fim, baixe o artefato "chave-de-assinatura": guarde o upload-keystore.jks num lugar seguro e
# copie o conteúdo de keystore.base64.txt para um NOVO secret chamado KEYSTORE_BASE64.
on:
  workflow_dispatch:

jobs:
  keystore:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Gerar o keystore
        run: |
          keytool -genkeypair -v \
            -keystore upload-keystore.jks \
            -alias upload \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
            -keypass "${{ secrets.KEYSTORE_PASSWORD }}" \
            -dname "CN=Organico do Chico, O=Organico do Chico, L=Belo Horizonte, ST=MG, C=BR"

      - name: Gerar o base64 (pra colar no secret KEYSTORE_BASE64)
        run: base64 -w0 upload-keystore.jks > keystore.base64.txt

      - name: Publicar a chave + base64
        uses: actions/upload-artifact@v4
        with:
          name: chave-de-assinatura
          path: |
            upload-keystore.jks
            keystore.base64.txt
          if-no-files-found: error

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tela do entregador</title>
  <meta name="theme-color" content="#0b1f4d" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/styles.css" />
</head>
<body>
  <div class="page-shell">
    <header class="hero hero-dark">
      <div class="hero-inner topbar">
        <div class="topbar-left">
          <div>
            <h1 class="topbar-title">Tela do entregador</h1>
          </div>
        </div>
        <div class="topbar-right">
          <button type="button" class="icon-btn" id="btnRefresh" aria-label="Atualizar">↻</button>
        </div>
      </div>
    </header>

    <main class="content">
      <section class="summary-card">
        <div class="summary-row summary-row-mobile">
          <div>
            <div class="summary-title">Entregador</div>
            <div class="summary-driver" id="driverNameText">-</div>
          </div>
        </div>

        <div class="toolbar stack-mobile">
  <button type="button" class="ghost-btn" id="btnTrocar">Trocar entregador</button>
  <button type="button" class="primary-btn" id="btnIniciarRota">Iniciar entregas</button>
<div id="loadingRota" class="hidden" style="margin-top:12px;text-align:center;color:#3158d3;font-weight:600;font-size:15px;">
  ⏳ Registrando início da rota, aguarde...
</div>
  <button type="button" class="ghost-btn" id="btnFinalizarRota">Finalizar rota</button>
</div>

        <div id="infoRota" class="info-rota"></div>

        <div class="footer-note" id="refreshInfo">Clique em “Iniciar entregas” para informar KM e foto antes de começar.</div>
        <div id="warningBox" class="warning-box hidden top-gap"></div>
      </section>

      <div id="loadingSections" class="section-stack">
        <div class="skeleton-card">
          <div class="skeleton skeleton-line big"></div>
          <div class="skeleton skeleton-line mid"></div>
          <div class="skeleton skeleton-line small"></div>
        </div>
        <div class="skeleton-card">
          <div class="skeleton skeleton-line big"></div>
          <div class="skeleton skeleton-line mid"></div>
          <div class="skeleton skeleton-line small"></div>
        </div>
      </div>

      <div id="errorBox" class="error-box hidden"></div>
      <div id="sectionsRoot" class="section-stack hidden"></div>
    </main>
  </div>

  <script src="/assets/config.js"></script>
  <script src="/assets/core.js"></script>
  <script src="/assets/page-entregas.js"></script>
</body>
</html>

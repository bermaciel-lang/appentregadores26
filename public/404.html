<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Página não encontrada</title>
  <style>
    body { background: #f3f4f8; color: rgba(0,0,0,.84); font-family: Arial, sans-serif; margin: 0; padding: 0; }
    #message { background: white; max-width: 420px; margin: 80px auto 16px; padding: 32px 24px 16px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,.08); }
    h1 { margin: 0 0 12px; font-size: 24px; }
    p { line-height: 1.45; }
    a { display: inline-block; margin-top: 16px; background: #3e63dd; color: white; text-decoration: none; padding: 12px 18px; border-radius: 12px; }
  </style>
</head>
<body>
  <div id="message">
    <h1>Página não encontrada</h1>
    <p>O endereço que você tentou abrir não existe neste app.</p>
    <a href="/">Voltar para o início</a>
  </div>
</body>
</html>
